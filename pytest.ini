[pytest]
testpaths = tests

pythonpath = .

python_files = test_*.py

# --import-mode=importlib: import each test file under a unique fully-qualified
# name instead of by bare basename, so test_*.py can repeat across dirs without
# colliding in sys.modules. Needs no __init__.py in the test tree.
addopts = --import-mode=importlib --doctest-modules --cov=ctalearn --cov-report=term-missing --benchmark-skip --benchmark-sort=name

xfail_strict = true
